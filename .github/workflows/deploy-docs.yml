name: Deploy Docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml

      - name: Install docs dependencies
        working-directory: docs
        run: composer install --no-dev --no-interaction --prefer-dist

      - name: Build latest
        working-directory: docs
        run: php vendor/bin/jigsaw build production
        env:
          JIGSAW_BASE_URL: /laravel-emissary
          JIGSAW_DEST: build_latest

      - name: Build 2.x
        working-directory: docs
        run: php vendor/bin/jigsaw build production
        env:
          JIGSAW_BASE_URL: /laravel-emissary/2.x
          JIGSAW_DEST: build_2x

      - name: Combine builds
        run: |
          rm -rf docs/build
          mkdir -p docs/build
          cp -r docs/build_latest/* docs/build/
          mv docs/build_2x docs/build/2.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate PageFind index
        run: |
          npm install -g pagefind
          pagefind --site docs/build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build
          publish_branch: gh-pages
