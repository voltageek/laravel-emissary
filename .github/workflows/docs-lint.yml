name: Docs Lint

on:
  push:
    branches: [master]
    paths:
      - 'config/emissary.php'
      - 'src/AgentError.php'
      - 'src/Commands/**'
      - 'src/Contracts/**'
      - 'docs/source/**'
      - 'scripts/docslint.php'
      - '.github/workflows/docs-lint.yml'
  pull_request:
    branches: [master]
    paths:
      - 'config/emissary.php'
      - 'src/AgentError.php'
      - 'src/Commands/**'
      - 'src/Contracts/**'
      - 'docs/source/**'
      - 'scripts/docslint.php'
      - '.github/workflows/docs-lint.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Run docs lint
        run: php scripts/docslint.php
